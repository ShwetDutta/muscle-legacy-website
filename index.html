    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What are the membership plans at Muscle Legacy?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Muscle Legacy offers three tier options: Starter (Essential strength zone & cardio access), Pro (Full gym and specialty rings/classes), and Elite (Full facility, customized nutrition, premium locker lounge, and weekly 1-on-1 coaching sessions)."
            }
          },
          {
            "@type": "Question",
            "name": "Do you have professional personal trainers?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, our certified and champion-level personal trainers specialize in bodybuilding, powerlifting, weight management, and tactical boxing."
            }
          },
          {
            "@type": "Question",
            "name": "Is valet parking available at your location?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, we offer complimentary 2-level secured valet parking for all members during club hours."
            }
          },
          {
            "@type": "Question",
            "name": "What are your operating hours?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We are open Monday to Saturday from 5:00 AM to 11:00 PM, and Sundays from 7:00 AM to 6:00 PM."
            }
          }
        ]
      }
